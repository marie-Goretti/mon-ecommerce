name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Backend
        working-directory: ./backend
        run: |
          docker build -t ${{ secrets.ECR_BACKEND_URL }}:latest .
          docker push ${{ secrets.ECR_BACKEND_URL }}:latest

      - name: Build and push Frontend
        working-directory: ./frontend
        run: |
          docker build -t ${{ secrets.ECR_FRONTEND_URL }}:latest .
          docker push ${{ secrets.ECR_FRONTEND_URL }}:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_BACKEND_URL }}

            # Pull nouvelles images
            docker pull ${{ secrets.ECR_BACKEND_URL }}:latest
            docker pull ${{ secrets.ECR_FRONTEND_URL }}:latest

            # Redémarrer les containers
            cd /home/ec2-user
            docker-compose down
            docker-compose up -d

            # Vérifier
            docker ps

      - name: Notify success
        run: |
          echo "✅ Déploiement réussi sur http://${{ secrets.EC2_HOST }}"