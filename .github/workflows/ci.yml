name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run tests
        working-directory: ./backend
        run: npm test --if-present
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Backend
        working-directory: ./backend
        run: |
          docker build -t ${{ secrets.ECR_BACKEND_URL }}:${{ github.sha }} .
          docker tag ${{ secrets.ECR_BACKEND_URL }}:${{ github.sha }} ${{ secrets.ECR_BACKEND_URL }}:latest
          docker push ${{ secrets.ECR_BACKEND_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_BACKEND_URL }}:latest

      - name: Build and push Frontend
        working-directory: ./frontend
        run: |
          docker build -t ${{ secrets.ECR_FRONTEND_URL }}:${{ github.sha }} .
          docker tag ${{ secrets.ECR_FRONTEND_URL }}:${{ github.sha }} ${{ secrets.ECR_FRONTEND_URL }}:latest
          docker push ${{ secrets.ECR_FRONTEND_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_FRONTEND_URL }}:latest